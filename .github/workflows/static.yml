name: Generate and Deploy Static Site

on:
  push:
    paths:
      - 'content/**'
    #branches:
    # - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Capture new file name
        id: newfile
        run: |
          NEW_FILE=$(git log -1 --name-only --pretty=format:'' --diff-filter=A -- content/) && echo "NEW_FILE=${NEW_FILE}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install

      - name: Generate static site
        run: npm run generate --file ${{ env.NEW_FILE }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}

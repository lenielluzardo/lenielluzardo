name: Sync Blog Posts to ll.db.blog

on:
  push:
    branches:
      - main
    paths:
      - 'www/src/blog/**/*.md'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-blog-posts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need at least 2 commits to detect changes
      
      - name: Get changed blog files
        id: changed-files
        run: |
          # Get list of changed markdown files in blog
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD -- 'www/src/blog/*.md' | grep -v 'readme.md' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No blog post changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed files:"
            echo "$CHANGED_FILES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # Convert to comma-separated for easier processing
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      
      - name: Checkout ll.db.blog repository
        if: steps.changed-files.outputs.has_changes == 'true'
        uses: actions/checkout@v4
        with:
          repository: lenielluzardo/ll.db.blog
          token: ${{ secrets.BLOG_SYNC_TOKEN }}
          path: blog-repo
      
      - name: Copy changed files to blog repo
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          # Copy each changed file from main repo to blog repo
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              # Extract just the filename from the path
              filename=$(basename "$file")
              echo "Copying $file to blog-repo/$filename"
              cp "$file" "blog-repo/$filename"
            fi
          done <<< "${{ steps.changed-files.outputs.files }}"
      
      - name: Commit and push to blog repo
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          cd blog-repo
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add *.md
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update blog posts from main repository [skip ci]"
            git push origin main
            echo "✓ Blog posts synced successfully"
          fi

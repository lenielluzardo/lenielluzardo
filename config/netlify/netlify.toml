[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Local dev server configuration
# Run: npx netlify dev (from www/ directory)
[dev]
  command = "npx @11ty/eleventy --serve --port 8080 --quiet"
  targetPort = 8080
  publish = "public"
  autoLaunch = false

# Netlify Identity + Git Gateway for CMS authentication
# Enable Identity service and Git Gateway in Netlify dashboard:
#   Site settings → Identity → Enable Identity
#   Site settings → Identity → Services → Git Gateway → Enable
#
# Note: The admin pages are served to everyone, but the CMS itself
# requires Netlify Identity login to access Git Gateway (write to repo).
# The real security is in Git Gateway, not in redirect rules.

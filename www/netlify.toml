# Local development only - used by `npx netlify dev`
# Site is deployed via GitHub Pages (see .github/workflows/deploy-gh-pages.yml)

[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Local dev server configuration
# Run: npx netlify dev (from www/ directory)
[dev]
  command = "npx @11ty/eleventy --serve --port 8080 --quiet"
  targetPort = 8080
  publish = "public"
  autoLaunch = false

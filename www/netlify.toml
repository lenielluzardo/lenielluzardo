[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Only build when changes are on main branch
# Pushes to dev or CMS draft branches won't trigger builds
[build.processing]
  skip_processing = false

# Netlify Identity + Git Gateway for CMS authentication
# Enable Identity service and Git Gateway in Netlify dashboard:
#   Site settings → Identity → Enable Identity
#   Site settings → Identity → Services → Git Gateway → Enable

# Protect admin routes - requires logged-in user with admin role
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = false
  conditions = {Role = ["admin"]}

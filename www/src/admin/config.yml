# Decap CMS Configuration - GitHub Pages Deployment
#
# Blog posts are managed in main repository at www/src/blog
# Uses GitHub backend with OAuth for authentication
#
# Editorial workflow: CMS edits create draft branches/PRs (no build triggered)
# Merging the PR to main triggers a GitHub Actions build + deploy
backend:
  name: github
  repo: lenielluzardo/lenielluzardo
  branch: main
  client_id: Iv23liPDjQSjoLyvmDn5

# For local development: run `npm run dev:cms` from www/ directory
# (decap-server must run from repo root so file paths resolve correctly)
local_backend: true

# Editorial workflow: edits go to draft branches, not directly to main
# This means CMS edits do NOT trigger builds until you merge the PR
publish_mode: editorial_workflow

# Media files configuration
media_folder: "www/src/assets/uploads" # Where uploaded images will be stored (relative to repo root)
public_folder: "/assets/uploads" # The public path for uploaded files

# Collections - Content types
collections:
  # Blog Posts Collection
  - name: "blog"
    label: "Blog Posts"
    folder: "www/src/blog" # Main repository blog folder
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "blog/{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "article.njk" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Tags", name: "tags", widget: "list", required: false, default: [] }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
  
  # Projects Collection
  - name: "projects"
    label: "Projects"
    folder: "www/src/projects" # Path relative to repository root
    create: true
    slug: "{{slug}}"
    preview_path: "projects/{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "article.njk" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", required: false, date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Technologies", name: "tech", widget: "list", required: false, default: [] }
      - { label: "Display Order", name: "order", widget: "number", default: 1, value_type: "int" }
      - { label: "Project URL", name: "link", widget: "string", required: false }
      - { label: "GitHub URL", name: "github", widget: "string", required: false }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
  
  # Site Configuration
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Site Configuration"
        name: "config"
        file: "www/site.config.json"
        fields:
          - label: "Pages"
            name: "pages"
            widget: "object"
            fields:
              - { label: "Blog", name: "blog", widget: "boolean", default: true }
              - { label: "Projects", name: "projects", widget: "boolean", default: true }
              - { label: "Work with Me", name: "workWithMe", widget: "boolean", default: true }
